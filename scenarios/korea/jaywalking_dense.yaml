# jaywalking_dense.yaml
# Korean-specific scenario: high-density jaywalking at urban crosswalk
#
# Background:
#   In dense Korean urban areas (Hongdae, Gangnam, Myeongdong), pedestrian volumes
#   are extremely high. Jaywalking — crossing on red — is common, especially in
#   commercial districts during peak hours.
#   Global models trained on compliant pedestrian behavior underestimate this risk.
#
# Test objective:
#   Ego approaches a signalized crosswalk where multiple pedestrians jaywalk on red.
#   Model must detect, predict, and yield despite the signal being green for ego.

scenario:
  id: jaywalking_dense_v1
  name: "고밀도 무단횡단 대응 (High-Density Jaywalking)"
  version: "1.0"
  author: "alpamayo-korea"

  scene:
    source: synthetic
    environment:
      location: commercial_district_crosswalk
      time_of_day: evening_peak   # 19:00 — highest pedestrian volume
      weather: clear
      country: KR
      city: Seoul
      district: Mapo-gu_Hongdae

    road_layout:
      type: signalized_crosswalk
      lane_width: 3.5
      lanes_per_direction: 3
      crosswalk_width: 6.0        # wide crosswalk (Korean commercial district)
      has_pedestrian_signal: true
      pedestrian_signal_state: red  # pedestrians SHOULD be waiting

  ego:
    start_position: [0.0, -40.0, 0.0]
    start_velocity: 11.1          # 40 km/h
    goal_position: [0.0, 40.0, 0.0]
    traffic_light_state: green    # ego has green — normal expectation: proceed

  agents:
    # Wave 1 — 3 pedestrians crossing early (before ego reaches crosswalk)
    - type: pedestrian
      model: adult
      start: [-8.0, 0.5, 1.57]
      behavior: jaywalk_crossing
      start_time: 2.0

    - type: pedestrian
      model: adult
      start: [-4.0, 0.5, 1.57]
      behavior: jaywalk_crossing
      start_time: 2.5

    - type: pedestrian
      model: adult
      start: [0.0, 0.5, 1.57]
      behavior: jaywalk_crossing
      start_time: 3.0

    # Wave 2 — 2 more following the first group
    - type: pedestrian
      model: adult
      start: [-6.0, 0.5, 1.57]
      behavior: jaywalk_crossing
      start_time: 3.5

    - type: pedestrian
      model: adult
      start: [4.0, 0.5, 1.57]
      behavior: jaywalk_crossing
      start_time: 4.0

    # Late straggler — enters after ego would normally have passed
    - type: pedestrian
      model: teenager
      start: [8.0, 0.5, 1.57]
      behavior: jaywalk_running    # running across late
      start_time: 5.5

  events:
    - at_time: 2.0
      trigger: pedestrian_jaywalk_wave
      params:
        wave_id: 1
        count: 3

    - at_time: 3.5
      trigger: pedestrian_jaywalk_wave
      params:
        wave_id: 2
        count: 2

    - at_time: 5.5
      trigger: pedestrian_late_runner
      params:
        agent_id: teenager

  success_criteria:
    - type: no_collision
    - type: yield_to_jaywalkers    # must yield despite having green light
    - type: resume_after_clear     # must proceed once crosswalk is clear
    - type: scenario_completion
      max_time: 30.0

  failure_conditions:
    - type: collision_with_pedestrian   # safety-critical failure
    - type: failure_to_yield
      definition: "pedestrian in path within 5m, no braking initiated"
    - type: excessive_hesitation
      max_stopped_seconds: 15.0   # must not be indefinitely stuck

  metrics:
    - name: jaywalker_detection_latency
      description: "Time from first jaywalker entering path to braking (s)"
    - name: minimum_clearance_to_pedestrian
      description: "Closest approach distance to any pedestrian (m)"
    - name: time_stopped_at_crosswalk
      description: "Total seconds ego waited at crosswalk (s)"
    - name: reasoning_mentions_jaywalking
      description: "Does trace mention 무단횡단 or 보행자 위반?"
      type: boolean
    - name: reasoning_explains_yield_despite_green
      description: "Does trace explain yielding despite having green light?"
      type: boolean
