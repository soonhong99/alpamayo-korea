<svg width="100%" viewBox="0 0 680 366" role="img" xmlns="http://www.w3.org/2000/svg">
<title>LM 블록의 융합 기회 — Q/K/V, Gate/Up, residual</title>
<desc>Thor 단일 SM 풀에서는 독립 연산을 동시 실행이 아니라 융합으로 활용한다. Q/K/V는 fused QKV GEMM 후보로 측정 필요, Gate/Up은 이미 융합 완료, residual은 add와 RMSNorm 융합 후보.</desc>
<style>text{font-family:Arial,'Malgun Gothic',sans-serif}.th{font-size:14px;font-weight:600}.ts{font-size:12px}</style>
<rect x="55" y="44" width="570" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/><text class="th" x="340" y="67" text-anchor="middle" fill="#3C3489">단일 SM 풀 — 독립 연산은 '동시 실행'이 아니라 '융합'으로 활용</text><text class="ts" x="340" y="86" text-anchor="middle" fill="#534AB7">공유 입력 1회 읽기 + launch 감소 + 큰 GEMM 효율</text>
<rect x="55" y="110" width="570" height="80" rx="8" fill="#FBFAF7" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3"/><text class="ts" x="67" y="128" fill="#5F5E5A">Attention · Q/K/V 독립 (공유 입력)</text>
<rect x="80" y="138" width="125" height="42" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/><text class="th" x="142" y="157" text-anchor="middle" fill="#0C447C">Q</text><text class="ts" x="142" y="173" text-anchor="middle" fill="#185FA5">4096→4096</text>
<rect x="215" y="138" width="125" height="42" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/><text class="th" x="277" y="157" text-anchor="middle" fill="#0C447C">K</text><text class="ts" x="277" y="173" text-anchor="middle" fill="#185FA5">4096→1024</text>
<rect x="350" y="138" width="125" height="42" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.6"/><text class="th" x="412" y="157" text-anchor="middle" fill="#0C447C">V</text><text class="ts" x="412" y="173" text-anchor="middle" fill="#185FA5">4096→1024</text>
<rect x="495" y="138" width="120" height="42" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/><text class="th" x="555" y="157" text-anchor="middle" fill="#633806">QKV 융합 후보</text><text class="ts" x="555" y="173" text-anchor="middle" fill="#854F0B">측정 필요</text>
<rect x="55" y="205" width="570" height="80" rx="8" fill="#FBFAF7" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3"/><text class="ts" x="67" y="223" fill="#5F5E5A">Gated MLP · Gate/Up 독립 (공유 입력)</text>
<rect x="80" y="233" width="160" height="42" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/><text class="th" x="160" y="252" text-anchor="middle" fill="#712B13">Gate</text><text class="ts" x="160" y="268" text-anchor="middle" fill="#993C1D">4096→12288</text>
<rect x="255" y="233" width="160" height="42" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/><text class="th" x="335" y="252" text-anchor="middle" fill="#712B13">Up</text><text class="ts" x="335" y="268" text-anchor="middle" fill="#993C1D">4096→12288</text>
<rect x="495" y="233" width="120" height="42" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/><text class="th" x="555" y="252" text-anchor="middle" fill="#085041">융합 완료</text><text class="ts" x="555" y="268" text-anchor="middle" fill="#0F6E56">gate·up 1커널</text>
<rect x="55" y="300" width="570" height="48" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/><text class="th" x="340" y="321" text-anchor="middle" fill="#633806">residual 재사용 — 블록당 add 2곳 (attn · MLP)</text><text class="ts" x="340" y="340" text-anchor="middle" fill="#854F0B">현재 별도 add 커널 (25 MB 텐서 왕복) → add+RMSNorm 융합 후보</text>
</svg>
