<svg width="100%" viewBox="0 0 680 290" role="img" xmlns="http://www.w3.org/2000/svg">
<title>메모리 바운드 구간에선 forward당 토큰을 늘려도 한계 비용 ≈ 0</title>
<desc>지금은 forward 1회가 토큰 1개를 만들며 가중치 15GB를 읽는다(19회=289GB). speculative decoding은 한 forward로 토큰 여러 개를 한 번에 검증해 약 5회(76GB)로 줄인다. 가중치 읽기 비용은 토큰 수와 무관하므로 forward당 토큰을 늘리는 것은 한계 비용 ≈ 0이고 출력은 검증으로 동일하다.</desc>
<style>text{font-family:Arial,'Malgun Gothic',sans-serif}.th{font-size:14px;font-weight:600}.ts{font-size:12px}</style>
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round"/></marker></defs>

<text class="ts" x="60" y="52" fill="#5F5E5A">지금 (autoregressive)</text>
<rect x="60" y="60" width="200" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/><text class="th" x="160" y="80" text-anchor="middle" fill="#0C447C">가중치 15 GB 읽기</text>
<line x1="262" y1="80" x2="300" y2="80" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="305" y="66" width="90" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/><text class="ts" x="350" y="80" text-anchor="middle" fill="#085041">토큰 1개</text>
<text class="th" x="420" y="80" fill="#993C1D">× 19회 = 289 GB</text>

<text class="ts" x="60" y="136" fill="#5F5E5A">speculative decoding (제안)</text>
<rect x="60" y="144" width="200" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/><text class="th" x="160" y="164" text-anchor="middle" fill="#0C447C">가중치 15 GB 읽기</text>
<line x1="262" y1="164" x2="300" y2="164" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ar)"/>
<rect x="305" y="150" width="175" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/><text class="ts" x="392" y="164" text-anchor="middle" fill="#085041">토큰 4개 (한 번에 검증)</text>
<text class="th" x="500" y="164" fill="#3B6D11">× ~5회 = 76 GB</text>

<rect x="55" y="210" width="570" height="60" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/><text class="th" x="340" y="232" text-anchor="middle" fill="#27500A">가중치 읽기 비용은 토큰 수와 무관 (메모리 바운드) → forward당 토큰↑ = 한계 비용 ≈ 0</text><text class="ts" x="340" y="254" text-anchor="middle" fill="#3B6D11">작은 draft가 미리 짐작 → 큰 모델이 한 번에 검증. 틀린 건 버림 → 출력은 비트 단위로 동일</text>
</svg>
