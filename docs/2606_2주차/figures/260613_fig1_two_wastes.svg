<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>UMIC가 제거한 두 종류의 낭비와 각각의 처방</title>
<desc>낭비 1은 연산 분해로 중간결과가 DRAM을 왕복하는 것이고 처방은 커널 융합. 낭비 2는 기성 cuBLAS가 가중치를 재독하는 것이고 처방은 측정으로 이긴 곳만 자체 커널로 교체. 결과는 Prefill DRAM 232에서 78 GB로 66퍼센트 감소.</desc>
<style>text{font-family:Arial,'Malgun Gothic',sans-serif}.th{font-size:14px;font-weight:600}.ts{font-size:12px}</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="55" y="50" width="255" height="66" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/><text class="th" x="182" y="80" text-anchor="middle" fill="#633806">낭비 1 · 연산 분해</text><text class="ts" x="182" y="101" text-anchor="middle" fill="#854F0B">중간결과가 DRAM을 왕복</text>
<rect x="370" y="50" width="255" height="66" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/><text class="th" x="497" y="80" text-anchor="middle" fill="#633806">낭비 2 · 기성 라이브러리</text><text class="ts" x="497" y="101" text-anchor="middle" fill="#854F0B">cuBLAS가 가중치를 재독</text>
<line x1="182" y1="116" x2="182" y2="183" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="497" y1="116" x2="497" y2="183" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="55" y="185" width="255" height="66" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/><text class="th" x="182" y="215" text-anchor="middle" fill="#085041">처방 · 커널 융합</text><text class="ts" x="182" y="236" text-anchor="middle" fill="#0F6E56">레지스터에서 처리, DRAM 1회</text>
<rect x="370" y="185" width="255" height="66" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/><text class="th" x="497" y="215" text-anchor="middle" fill="#085041">처방 · 자체 커널</text><text class="ts" x="497" y="236" text-anchor="middle" fill="#0F6E56">측정으로 이긴 곳만 교체</text>
<rect x="55" y="288" width="570" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/><text class="th" x="340" y="311" text-anchor="middle" fill="#0C447C">결과 · Prefill DRAM 232 → 78 GB (−66%)</text><text class="ts" x="340" y="330" text-anchor="middle" fill="#185FA5">추정이 아니라 ncu 실측으로 우선순위를 정하고, 적용 후 다시 측정해 검증</text>
</svg>
